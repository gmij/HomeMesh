<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-label="HomeMesh admin console UI prototype high resolution vector">
  <title>HomeMesh Admin Console UI Prototype - High Resolution Vector</title>
  <desc>High-resolution vector archive of the HomeMesh admin console UI prototype. This file intentionally uses native SVG shapes and text to remain sharp on GitHub and in design references.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#0a1930"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102039"/>
      <stop offset="1" stop-color="#0d1b31"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.22"/>
    </filter>
    <style>
      .title{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:34px;font-weight:800;fill:#e6eefc}
      .subtitle{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:18px;fill:#8ea4c2}
      .nav{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:19px;fill:#8ea4c2}
      .navActive{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:19px;font-weight:700;fill:#5eead4}
      .label{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:17px;fill:#8ea4c2}
      .text{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:18px;fill:#e6eefc}
      .small{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:15px;fill:#8ea4c2}
      .metric{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:39px;font-weight:800;fill:#e6eefc}
      .h2{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:25px;font-weight:800;fill:#e6eefc}
      .h3{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:20px;font-weight:700;fill:#e6eefc}
      .button{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:16px;font-weight:700;fill:#e6eefc}
      .pill{font-family:Inter,Segoe UI,Arial,sans-serif;font-size:14px;font-weight:700;fill:#5eead4}
      .line{stroke:#263a56;stroke-width:1}
    </style>
  </defs>

  <rect width="1672" height="941" fill="url(#bg)"/>

  <rect x="0" y="0" width="250" height="941" fill="#0b1728"/>
  <line x1="250" y1="0" x2="250" y2="941" class="line"/>
  <text x="36" y="64" class="title">HomeMesh</text>
  <text x="36" y="122" class="navActive">控制台</text>
  <text x="36" y="166" class="nav">网络</text>
  <text x="36" y="210" class="nav">成员</text>
  <text x="36" y="254" class="nav">审计日志</text>
  <text x="36" y="298" class="nav">Swagger</text>
  <rect x="32" y="822" width="166" height="44" rx="12" fill="#1e3a5f"/>
  <text x="62" y="850" class="button">退出登录</text>

  <text x="292" y="70" class="title">HomeMesh 管理控制台</text>
  <text x="292" y="105" class="subtitle">Home SD-WAN Controller · admin / Admin</text>

  <g filter="url(#shadow)">
    <rect x="292" y="136" width="308" height="112" rx="22" fill="url(#panel)" stroke="#263a56"/>
    <rect x="624" y="136" width="308" height="112" rx="22" fill="url(#panel)" stroke="#263a56"/>
    <rect x="956" y="136" width="308" height="112" rx="22" fill="url(#panel)" stroke="#263a56"/>
    <rect x="1288" y="136" width="308" height="112" rx="22" fill="url(#panel)" stroke="#263a56"/>
  </g>
  <text x="318" y="176" class="label">Health</text><text x="318" y="223" class="metric">Healthy</text>
  <text x="650" y="176" class="label">Networks</text><text x="650" y="223" class="metric">3</text>
  <text x="982" y="176" class="label">Members</text><text x="982" y="223" class="metric">12</text>
  <text x="1314" y="176" class="label">Sync Errors</text><text x="1314" y="223" class="metric">0</text>

  <g filter="url(#shadow)">
    <rect x="292" y="276" width="1304" height="198" rx="22" fill="url(#panel)" stroke="#263a56"/>
  </g>
  <text x="320" y="322" class="h2">网络</text>
  <rect x="320" y="346" width="202" height="42" rx="11" fill="#0c1a30" stroke="#2d4568"/>
  <text x="340" y="373" class="small">家庭主网络</text>
  <rect x="536" y="346" width="202" height="42" rx="11" fill="#0c1a30" stroke="#2d4568"/>
  <text x="556" y="373" class="small">10.10.0.0/24</text>
  <rect x="752" y="346" width="152" height="42" rx="11" fill="#0c1a30" stroke="#2d4568"/>
  <text x="775" y="373" class="small">Demo 演示</text>
  <rect x="922" y="346" width="116" height="42" rx="11" fill="#0f766e"/>
  <text x="949" y="373" class="button">创建网络</text>
  <rect x="1054" y="346" width="148" height="42" rx="11" fill="#1e3a5f"/>
  <text x="1081" y="373" class="button">下载 plant</text>
  <rect x="1218" y="346" width="88" height="42" rx="11" fill="#1e3a5f"/>
  <text x="1246" y="373" class="button">刷新</text>
  <text x="320" y="422" class="small">Providers: Demo:Healthy, ZeroTier:Warning</text>
  <line x1="320" y1="442" x2="1568" y2="442" class="line"/>
  <text x="338" y="464" class="small">名称</text><text x="690" y="464" class="small">CIDR</text><text x="1010" y="464" class="small">自动审核</text><text x="1320" y="464" class="small">状态</text>

  <g filter="url(#shadow)">
    <rect x="292" y="502" width="632" height="178" rx="22" fill="url(#panel)" stroke="#263a56"/>
    <rect x="964" y="502" width="632" height="178" rx="22" fill="url(#panel)" stroke="#263a56"/>
  </g>
  <text x="320" y="548" class="h2">Easy Setup</text>
  <rect x="320" y="572" width="172" height="42" rx="11" fill="#0c1a30" stroke="#2d4568"/><text x="340" y="599" class="small">CIDR</text>
  <rect x="506" y="572" width="172" height="42" rx="11" fill="#0c1a30" stroke="#2d4568"/><text x="526" y="599" class="small">IP池开始</text>
  <rect x="692" y="572" width="172" height="42" rx="11" fill="#0c1a30" stroke="#2d4568"/><text x="712" y="599" class="small">IP池结束</text>
  <rect x="320" y="630" width="18" height="18" rx="4" fill="#0f766e"/><text x="350" y="645" class="small">自动分配地址</text>
  <rect x="500" y="630" width="18" height="18" rx="4" fill="#0f766e"/><text x="530" y="645" class="small">自动审核成员</text>
  <rect x="720" y="622" width="144" height="42" rx="11" fill="#0f766e"/><text x="742" y="649" class="button">应用快速配置</text>

  <text x="992" y="548" class="h2">同步状态</text>
  <text x="992" y="588" class="small">成员同步：Healthy 2026-05-18 12:52 自动授权 2 个</text>
  <text x="992" y="622" class="small">配置同步：Healthy 2026-05-18 12:50</text>
  <rect x="992" y="642" width="116" height="42" rx="11" fill="#0f766e"/><text x="1018" y="669" class="button">同步成员</text>
  <rect x="1124" y="642" width="116" height="42" rx="11" fill="#0f766e"/><text x="1150" y="669" class="button">同步配置</text>

  <g filter="url(#shadow)">
    <rect x="292" y="708" width="632" height="186" rx="22" fill="url(#panel)" stroke="#263a56"/>
    <rect x="964" y="708" width="632" height="186" rx="22" fill="url(#panel)" stroke="#263a56"/>
  </g>
  <text x="320" y="752" class="h2">路由 / IP池 / DNS</text>
  <text x="320" y="792" class="h3">路由</text>
  <text x="320" y="828" class="small">10.10.0.0/24</text>
  <text x="558" y="828" class="small">Via: -</text>
  <rect x="776" y="804" width="84" height="36" rx="10" fill="#7f1d1d"/><text x="802" y="828" class="button">删除</text>
  <text x="320" y="870" class="h3">IP池</text>
  <text x="388" y="870" class="small">10.10.0.10 - 10.10.0.200</text>

  <text x="992" y="752" class="h2">成员</text>
  <line x1="992" y1="778" x2="1564" y2="778" class="line"/>
  <text x="1004" y="806" class="small">ID</text><text x="1178" y="806" class="small">名称</text><text x="1302" y="806" class="small">授权</text><text x="1378" y="806" class="small">IP地址</text><text x="1508" y="806" class="small">操作</text>
  <line x1="992" y1="822" x2="1564" y2="822" class="line"/>
  <text x="1004" y="850" class="small">demo-laptop</text><text x="1178" y="850" class="small">演示笔记本</text><text x="1302" y="850" class="small">是</text>
  <rect x="1378" y="830" width="112" height="34" rx="9" fill="#0c1a30" stroke="#2d4568"/><text x="1390" y="852" class="small">10.10.0.10</text>
  <rect x="1508" y="830" width="70" height="34" rx="9" fill="#1e3a5f"/><text x="1520" y="852" class="button">分配IP</text>
</svg>
