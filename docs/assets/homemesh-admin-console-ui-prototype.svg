<svg xmlns="http://www.w3.org/2000/svg" width="1672" height="941" viewBox="0 0 1672 941" role="img" aria-label="HomeMesh historical admin console UI prototype">
  <title>HomeMesh Historical Admin Console UI Prototype</title>
