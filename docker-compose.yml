name: homemesh

services:
  homemesh-controller:
    image: ${HOMEMESH_IMAGE:-ghcr.io/gmij/homemesh-controller:latest}
    pull_policy: always
    restart: unless-stopped
    ports:
      - "${HOMEMESH_HTTP_PORT:-8080}:8080"
      - "${ZT_HOST_PORT:-9993}:9993/udp"
      - "${ZT_HOST_PORT:-9993}:9993"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      ASPNETCORE_URLS: http://+:8080
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__HomeMesh: ${ConnectionStrings__HomeMesh:-Data Source=/app/data/homemesh.db}
      Providers__ZeroTier__Enabled: ${Providers__ZeroTier__Enabled:-true}
      Providers__ZeroTier__Port: ${Providers__ZeroTier__Port:-9993}
      Providers__ZeroTier__AuthTokenPath: ${Providers__ZeroTier__AuthTokenPath:-/var/lib/zerotier-one/authtoken.secret}
      # Leave empty to auto-detect the server public IP on first start.
      IP_ADDR4: ${IP_ADDR4:-}
      IP_ADDR6: ${IP_ADDR6:-}
      ZT_PORT: ${ZT_PORT:-9993}
      # Keep this aligned with the externally exposed ZeroTier port.
      ZT_PUBLIC_PORT: ${ZT_PUBLIC_PORT:-9993}
    volumes:
      - ./data:/app/data
      - ./zerotier-one:/var/lib/zerotier-one
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
