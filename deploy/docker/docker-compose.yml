services:
  homemesh-controller:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    container_name: homemesh-controller
    restart: unless-stopped
    ports:
      - "19993:9993/udp"  # ZeroTier P2P 流量（避开宿主机 9993，正式部署时改回 9993:9993/udp）
      - "19993:9993"       # ZeroTier 本地 HTTP 控制 API（避开宿主机 9993）
      - "15555:8080"        # HomeMesh WebApi
    volumes:
      - homemesh-data:/app/data          # SQLite 数据库
      - homemesh-zerotier:/var/lib/zerotier-one  # ZeroTier 身份与配置
      - homemesh-dist:/app/dist          # 生成的 planet / moon 文件
      - homemesh-config:/app/config      # 运行时配置（端口、IP 等）
    environment:
      TZ: Asia/Shanghai
      # ── ZeroTier planet 配置 ──────────────────────────────────────────────
      # 必填：公网 IPv4 地址，用于生成 planet 文件；留空则自动探测（需能访问外网）
      IP_ADDR4: ""
      # 可选：公网 IPv6 地址
      IP_ADDR6: ""
      # ZeroTier P2P 端口（同时也是本地 HTTP 控制 API 端口）
      ZT_PORT: "9993"
      # 对外公布给客户端的 ZeroTier 端口（需与 ports 映射的宿主机端口一致）
      ZT_PUBLIC_PORT: "19993"
      # ── HomeMesh WebApi 配置 ──────────────────────────────────────────────
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__HomeMesh: Data Source=/app/data/homemesh.db
      Providers__ZeroTier__Enabled: "true"
      Providers__ZeroTier__Port: "9993"
      Providers__ZeroTier__AuthTokenPath: /var/lib/zerotier-one/authtoken.secret
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun

volumes:
  homemesh-data:
  homemesh-zerotier:
  homemesh-dist:
  homemesh-config:

