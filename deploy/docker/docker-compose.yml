services:
  homemesh-controller:
    build:
      context: ../..
      dockerfile: Dockerfile
    container_name: homemesh-controller
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - homemesh-data:/app/data
      # If ZeroTier One runs on the host, mount the auth token as read-only.
      # - /var/lib/zerotier-one/authtoken.secret:/var/lib/zerotier-one/authtoken.secret:ro
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__HomeMesh: Data Source=/app/data/homemesh.db
      Providers__ZeroTier__Enabled: "true"
      Providers__ZeroTier__ApiBaseUrl: http://127.0.0.1:9993
      Providers__ZeroTier__AuthTokenPath: /var/lib/zerotier-one/authtoken.secret

volumes:
  homemesh-data:
