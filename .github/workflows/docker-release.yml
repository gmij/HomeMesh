name: Docker Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Sync submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      - name: Verify Docker build inputs
        run: |
          test -f .gitmodules
          test -f deploy/docker/zt-sparse/ext/nlohmann/json.hpp
          test -f deploy/docker/zt-sparse/attic/world/mkworld.cpp || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/homemesh-controller
          tags: |
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
            type=ref,event=tag
            type=sha

      - name: Build Docker image for validation
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          load: true
          tags: homemesh-controller:release-check
          no-cache-filters: webapi-publish
          cache-from: type=gha,scope=docker-release
          cache-to: type=gha,mode=max,scope=docker-release

      - name: Smoke test release image
        run: |
          docker run --rm --entrypoint /bin/sh homemesh-controller:release-check -lc "\
            test -f /app/HomeMesh.WebApi.dll && \
            test -f /app/wwwroot/index.html && \
            test -x /usr/local/bin/mkworld"

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          no-cache-filters: webapi-publish
          cache-from: type=gha,scope=docker-release
          cache-to: type=gha,mode=max,scope=docker-release
