name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Show .NET info
        run: dotnet --info

      - name: Restore
        run: dotnet restore HomeMesh.sln --verbosity minimal

      - name: Build
        run: dotnet build HomeMesh.sln --configuration Release --no-restore --verbosity minimal

      - name: Test
        run: dotnet test tests/HomeMesh.Tests/HomeMesh.Tests.csproj --configuration Release --no-restore --verbosity normal
