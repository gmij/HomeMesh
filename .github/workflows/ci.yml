name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/HomeMesh.AdminConsole/package-lock.json

      - name: Restore
        run: dotnet restore HomeMesh.sln --verbosity minimal

      - name: Build
        run: dotnet build HomeMesh.sln --configuration Release --no-restore --verbosity minimal

      - name: Test
        run: dotnet test tests/HomeMesh.Tests/HomeMesh.Tests.csproj --configuration Release --no-build --no-restore --verbosity normal

      - name: Verify publish package
        run: dotnet publish src/HomeMesh.WebApi/HomeMesh.WebApi.csproj --configuration Release --output artifacts/publish/webapi --no-build --no-restore --verbosity minimal
